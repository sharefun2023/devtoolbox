<script>
let currentMode = 'css';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('inputArea').placeholder = mode === 'css'
    ? 'Paste your CSS code here...'
    : 'Paste your JavaScript code here...';
}

// --- Live char count ---
document.getElementById('inputArea').addEventListener('input', function() {
  document.getElementById('inputCount').textContent = this.value.length + ' chars';
});
document.getElementById('outputArea').addEventListener('input', function() {
  document.getElementById('outputCount').textContent = this.value.length + ' chars';
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// --- Minify ---
function minify() {
  const input = document.getElementById('inputArea').value;
  if (!input.trim()) { showToast('Nothing to compress'); return; }

  let output;
  if (currentMode === 'css') {
    output = minifyCSS(input);
  } else {
    output = minifyJS(input);
  }

  document.getElementById('outputArea').value = output;
  document.getElementById('outputCount').textContent = output.length + ' chars';
  showToast('Compressed successfully');
}

function minifyCSS(css) {
  return css
    // Remove multi-line comments (/* ... */)
    .replace(/\/\*[\s\S]*?\*\//g, '')
    // Remove single-line comments (// ...) — CSS doesn't officially have them, but some preprocessors use them
    .replace(/\/\/.*$/gm, '')
    // Collapse whitespace around braces and semicolons
    .replace(/\s*\{\s*/g, '{')
    .replace(/\s*\}\s*/g, '}')
    .replace(/\s*;\s*/g, ';')
    .replace(/\s*:\s*/g, ':')
    .replace(/\s*,\s*/g, ',')
    // Collapse multiple spaces to one
    .replace(/\s+/g, ' ')
    // Remove trailing semicolons before closing braces
    .replace(/;}/g, '}')
    // Trim whitespace around selectors
    .replace(/\s*>\s*/g, '>')
    .replace(/\s*\+\s*/g, '+')
    .replace(/\s*~\s*/g, '~')
    // Remove leading/trailing whitespace on each line
    .split('\n').map(l => l.trim()).join('')
    // Collapse all remaining whitespace runs
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function minifyJS(js) {
  // Token-aware minification
  let result = '';
  let i = 0;
  const len = js.length;

  while (i < len) {
    const ch = js[i];
    const next = i + 1 < len ? js[i + 1] : '';

    // Skip line comments
    if (ch === '/' && next === '/') {
      while (i < len && js[i] !== '\n') i++;
      i++;
      continue;
    }

    // Skip block comments
    if (ch === '/' && next === '*') {
      i += 2;
      while (i < len && !(js[i] === '*' && i + 1 < len && js[i + 1] === '/')) i++;
      i += 2;
      continue;
    }

    // Preserve strings (single, double, template literal)
    if (ch === "'" || ch === '"' || ch === '`') {
      const quote = ch;
      result += quote;
      i++;
      while (i < len) {
        if (js[i] === '\\') { result += '\\' + (i + 1 < len ? js[i + 1] : ''); i += 2; continue; }
        if (js[i] === quote) { result += quote; i++; break; }
        result += js[i];
        i++;
      }
      continue;
    }

    // Preserve regex literals (heuristic: /.../ not preceded by a word/close paren)
    if (ch === '/' && i > 0 && /[\(\[\{,:;=+\-*/%|&!^<>?~]\s*$/.test(result)) {
      result += '/';
      i++;
      while (i < len) {
        if (js[i] === '\\') { result += '\\' + (i + 1 < len ? js[i + 1] : ''); i += 2; continue; }
        if (js[i] === '/') { result += '/'; i++; break; }
        if (js[i] === '\n') break; // malformed regex
        result += js[i];
        i++;
      }
      continue;
    }

    // Skip whitespace (except in strings)
    if (/\s/.test(ch)) {
      i++;
      // Insert a space only when needed to separate tokens
      const prevResultChar = result.length > 0 ? result[result.length - 1] : '';
      const nextNonWs = getNextNonWS(js, i);
      if (prevResultChar && nextNonWs &&
          needsSpaceBetween(prevResultChar, nextNonWs)) {
        result += ' ';
      }
      continue;
    }

    result += ch;
    i++;
  }

  return result.trim();
}

function getNextNonWS(str, pos) {
  while (pos < str.length && /\s/.test(str[pos])) pos++;
  return pos < str.length ? str[pos] : null;
}

function needsSpaceBetween(a, b) {
  // Insert space between two alphanumeric/identifier tokens
  if (/[a-zA-Z0-9_$]/.test(a) && /[a-zA-Z0-9_$]/.test(b)) return true;
  // Space between keyword and identifier
  if (/[a-zA-Z0-9_$}]/.test(a) && /[{([a-zA-Z0-9_$]/.test(b)) return false;
  return false;
}

// --- Beautify ---
function beautify() {
  const input = document.getElementById('inputArea').value;
  if (!input.trim()) { showToast('Nothing to beautify'); return; }

  document.getElementById('outputArea').value = output;
  document.getElementById('outputCount').textContent = output.length + ' chars';
  showToast('Beautified successfully');

function beautifyCSS(css) {
  // First: strip existing whitespace artifacts, then reformat
  let clean = css
    // Remove comments
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .trim();

  let indent = 0;
  let result = '';
  let inValue = false;

  for (let i = 0; i < clean.length; i++) {
    const ch = clean[i];

    if (ch === '{') {
      result += ' {\n';
      indent++;
      inValue = false;
    } else if (ch === '}') {
      indent = Math.max(0, indent - 1);
      result += '\n' + '  '.repeat(indent) + '}';
      // Check for adjacent closing braces
      if (i + 1 < clean.length && clean[i + 1] === '}') {
        result += '\n';
      } else if (i + 1 < clean.length) {
        result += '\n';
      }
    } else if (ch === ';') {
      result += ';\n';
      if (indent > 0) {
        // Check next char — if closing brace, don't add indent line
        const nextNonWS = getNextNonSpace(clean, i + 1);
        if (nextNonWS !== '}') {
          result += '  '.repeat(indent);
        }
      }
    } else if (ch === ':') {
      result += ': ';
    } else if (ch === ',') {
      result += ', ';
      i++; // skip next space if any
      while (i < clean.length && clean[i] === ' ') i++;
      i--;
    } else if (ch === '\n' || ch === '\r') {
      // skip existing newlines
    } else if (/\s/.test(ch)) {
      // At start of line, skip leading spaces (we add our own)
      if (result.endsWith('\n')) {
        result += '  '.repeat(indent);
      }
      // Skip consecutive spaces
      if (result.length > 0 && result[result.length - 1] === ' ') continue;
      result += ' ';
    } else {
      result += ch;
    }
  }

  return result.trim();
}

function getNextNonSpace(str, pos) {
  while (pos < str.length && (str[pos] === ' ' || str[pos] === '\n' || str[pos] === '\r')) pos++;
  return pos < str.length ? str[pos] : null;
}

function beautifyJS(js) {
  // Basic JS beautifier
  let result = '';
  let indent = 0;
  let inString = false;
  let stringChar = '';
  let i = 0;

  // Pre-clean: remove comments for reformatting
  const noComments = js
    .replace(/\/\/.*$/gm, '')
    .replace(/\/\*[\s\S]*?\*\//g, '');

  for (let i = 0; i < noComments.length; i++) {
    const ch = noComments[i];
    const next = i + 1 < noComments.length ? noComments[i + 1] : '';

    // Handle strings
    if ((ch === "'" || ch === '"' || ch === '`') && !inString) {
      inString = true;
      stringChar = ch;
      result += ch;
      continue;
    }
    if (inString) {
      if (ch === '\\') { result += ch + next; i++; continue; }
      result += ch;
      if (ch === stringChar) inString = false;
      continue;
    }

    if (ch === '{') {
      result += ' {\n';
      indent++;
      result += '  '.repeat(indent);
    } else if (ch === '}') {
      indent = Math.max(0, indent - 1);
      result += '\n' + '  '.repeat(indent) + '}';
    } else if (ch === ';') {
      result += ';\n' + '  '.repeat(indent);
    } else if (ch === '(') {
      result += '(';
    } else if (ch === ')') {
      result += ')';
    } else if (ch === ',') {
      result += ', ';
    } else if (ch === '\n' || ch === '\r') {
      // skip
    } else if (/\s/.test(ch)) {
      // Collapse whitespace
      if (result.length > 0 && !/\s/.test(result[result.length - 1])) {
        result += ' ';
      }
    } else {
      result += ch;
    }
  }

  return result.trim();
}

function clearOutput() {
  document.getElementById('outputArea').value = '';
  document.getElementById('outputCount').textContent = '0 chars';
  showToast('Output cleared');
}

function copyOutput() {
  const text = document.getElementById('outputArea').value;
  if (!text) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback
    document.getElementById('outputArea').select();
    document.execCommand('copy');
    showToast('Copied to clipboard');
  });
}
